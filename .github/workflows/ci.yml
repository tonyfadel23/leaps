name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install (skip the Electron binary — tests don't need it)
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      - name: Unit + structural tests
        run: npm test
