    required: false
    fallback_mode: ask_user

  image_generation:
    description: "Product mockup images for prototypes"
    # primary:
    #   mcp: your-image-tool
    #   hint: "Image generation for prototype visuals."
    required: false
    fallback_mode: skip

  # --- Voice of Customer ---

  product_analytics:
    description: "Behavioral event data — funnels, retention, user paths, in-app actions"
    # primary:
    #   mcp: amplitude  # or mixpanel, posthog, heap
    #   hint: "Query events, funnels, retention. Specify event names and properties."
    required: false
    fallback_mode: ask_user

  feedback:
