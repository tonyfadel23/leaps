# Generic Preset — Blank connector bindings for any company
# Copy this to connectors.yaml at the project root, then run /setup to configure.
#
# All roles are unbound. The pipeline still works — skills will ask you to
# paste data or skip enrichment steps when connectors are missing.

connectors:
  metrics_source:
    description: "Customer counts, order volumes, sizing, baselines, unit economics"
    # primary:
    #   mcp: your-bi-tool
    #   url: "https://..."
    #   transport: http
    #   hint: "How to query your BI tool — which tables, which fields."
    # fallbacks: []
    required: true
    fallback_mode: ask_user

  knowledge_base:
    description: "Prior work, domain ownership, existing decisions, tribal knowledge"
    # primary:
    #   mcp: your-knowledge-tool
    #   url: "https://..."
    #   transport: http
    #   hint: "How to search your knowledge base."
    required: false
    fallback_mode: ask_user

  design_system:
    description: "Design tokens, component patterns, visual language"
    # primary:
    #   mcp: figma
    #   hint: "Figma file URL for design tokens."
    required: false
    fallback_mode: skip

  ticketing:
    description: "Issue tracking, sprint context, engineering tickets"
    # primary:
    #   mcp: your-ticketing-tool
    #   url: "https://..."
    #   transport: http
    #   hint: "Jira, Linear, Shortcut, etc."
    required: false
    fallback_mode: skip

  communication:
    description: "Team messaging, signals, async comms"
